name: release bottles

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Homebrew package version to release, e.g. 2.4.2 or 2.4.2_1.
        required: true
        type: string
      release_tag:
        description: Optional GitHub tag/release name and bottle root_url tag, e.g. 2.4.2-b1. Defaults to package_version.
        required: false
        type: string
      prerelease:
        description: Create the GitHub release as a prerelease.
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  TAP: kaoh/globalplatform
  FORMULA: kaoh/globalplatform/globalplatform

jobs:
  build-bottles:
    name: build/validate (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-22.04
            produces_bottle: true
          - name: macOS 14 arm64
            runner: macos-14
            produces_bottle: true
          - name: macOS 15 arm64
            runner: macos-15
            produces_bottle: true
          - name: macOS 15 Intel
            runner: macos-15-intel
            produces_bottle: false
          - name: macOS 26 arm64
            runner: macos-26
            produces_bottle: true
          - name: macOS 26 Intel
            runner: macos-26-intel
            produces_bottle: false
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Link tap into Homebrew
        shell: bash
        run: |
          set -euo pipefail
          HOMEBREW_REPOSITORY="$(brew --repository)"
          HOMEBREW_TAP_DIR="${HOMEBREW_REPOSITORY}/Library/Taps/kaoh/homebrew-globalplatform"
          mkdir -p "$(dirname "$HOMEBREW_TAP_DIR")"
          rm -rf "$HOMEBREW_TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$HOMEBREW_TAP_DIR"

      - name: Prepare bottle root_url for requested release
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" != "branch" ]]; then
            echo "This workflow must be dispatched on a branch, not on a ${REF_TYPE} ref (${REF_NAME})"
            exit 1
          fi
          ruby <<'RUBY'
          path = "Formula/globalplatform.rb"
          package_version = ENV.fetch("PACKAGE_VERSION")
          release_tag = ENV.fetch("RELEASE_TAG", "").strip
          release_tag = package_version if release_tag.empty?
          package_match = package_version.match(/\A(?<base>[0-9A-Za-z.+-]+?)(?:_(?<revision>[1-9]\d*))?\z/)
          abort("Invalid package version #{package_version.inspect}") unless package_match

          base_version = package_match[:base]
          revision = package_match[:revision]
          text = File.read(path)

          source_tag = text[/url\s+"[^"]+",\s*tag:\s*"([^"]+)"/, 1]
          abort("Failed to determine source tag from #{path}") unless source_tag
          abort("Formula source tag #{source_tag.inspect} does not match requested base version #{base_version.inspect}") unless source_tag == base_version

          bottle_root_updated = text.sub!(
            /(root_url\s+"https:\/\/github\.com\/kaoh\/homebrew-globalplatform\/releases\/download\/)([^"]+)(")/,
            "\\1#{release_tag}\\3"
          )
          abort("Failed to update bottle root_url in #{path}") unless bottle_root_updated

          text.gsub!(/^\s*revision\s+\d+\s*\n/, "")
          if revision
            revision_line = "  revision #{revision}"
            text.sub!(/^(\s*url[^\n]*\n)/, "\\1#{revision_line}\n") or
              abort("Failed to insert revision into #{path}")
          end

          File.write(path, text)
          RUBY

          ruby -c Formula/globalplatform.rb

      - name: Run brew test-bot preflight
        shell: bash
        run: |
          set -euo pipefail
          brew test-bot --only-cleanup-before
          brew test-bot --only-setup
          brew test-bot --only-tap-syntax --tap="$TAP"

      - name: Build bottles
        if: ${{ matrix.produces_bottle }}
        shell: bash
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          effective_release_tag="${RELEASE_TAG:-$PACKAGE_VERSION}"
          root_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${effective_release_tag}"
          brew test-bot --only-formulae --root-url="$root_url" --tap="$TAP" "$FORMULA"

      - name: Validate source build on non-bottling runners
        if: ${{ !matrix.produces_bottle }}
        shell: bash
        run: |
          set -euo pipefail
          brew install --formula --build-from-source "$FORMULA"
          brew test "$FORMULA"

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            keg_prefix="$(brew --prefix "$FORMULA")"
            /usr/bin/codesign --verify --strict --verbose=2 "$keg_prefix/bin/gpshell"

            while IFS= read -r -d '' dylib; do
              /usr/bin/codesign --verify --strict --verbose=2 "$dylib"
            done < <(find "$keg_prefix/lib" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.bundle" \) -print0)
          fi

      - name: Collect bottle artifacts
        if: ${{ always() && matrix.produces_bottle }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact-output
          find "$GITHUB_WORKSPACE" -type f \
            \( -name "*.bottle*.tar.gz" -o -name "*.bottle*.json" \) \
            -exec cp -v {} artifact-output/ \; || true

      - name: Upload bottle artifacts
        if: ${{ always() && matrix.produces_bottle }}
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.runner }}
          path: artifact-output
          if-no-files-found: error

  publish-release:
    name: merge bottle block and publish release
    runs-on: ubuntu-22.04
    needs: build-bottles
    permissions:
      contents: write
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        uses: Homebrew/actions/git-user-config@main

      - name: Link tap into Homebrew
        shell: bash
        run: |
          set -euo pipefail
          HOMEBREW_REPOSITORY="$(brew --repository)"
          HOMEBREW_TAP_DIR="${HOMEBREW_REPOSITORY}/Library/Taps/kaoh/homebrew-globalplatform"
          mkdir -p "$(dirname "$HOMEBREW_TAP_DIR")"
          rm -rf "$HOMEBREW_TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$HOMEBREW_TAP_DIR"

      - name: Prepare bottle root_url for requested release
        shell: bash
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          path = "Formula/globalplatform.rb"
          package_version = ENV.fetch("PACKAGE_VERSION")
          release_tag = ENV.fetch("RELEASE_TAG", "").strip
          release_tag = package_version if release_tag.empty?
          package_match = package_version.match(/\A(?<base>[0-9A-Za-z.+-]+?)(?:_(?<revision>[1-9]\d*))?\z/)
          abort("Invalid package version #{package_version.inspect}") unless package_match

          base_version = package_match[:base]
          revision = package_match[:revision]
          text = File.read(path)

          source_tag = text[/url\s+"[^"]+",\s*tag:\s*"([^"]+)"/, 1]
          abort("Failed to determine source tag from #{path}") unless source_tag
          abort("Formula source tag #{source_tag.inspect} does not match requested base version #{base_version.inspect}") unless source_tag == base_version

          bottle_root_updated = text.sub!(
            /(root_url\s+"https:\/\/github\.com\/kaoh\/homebrew-globalplatform\/releases\/download\/)([^"]+)(")/,
            "\\1#{release_tag}\\3"
          )
          abort("Failed to update bottle root_url in #{path}") unless bottle_root_updated

          text.gsub!(/^\s*revision\s+\d+\s*\n/, "")
          if revision
            revision_line = "  revision #{revision}"
            text.sub!(/^(\s*url[^\n]*\n)/, "\\1#{revision_line}\n") or
              abort("Failed to insert revision into #{path}")
          end

          File.write(path, text)
          RUBY

          ruby -c Formula/globalplatform.rb

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bottles-*
          merge-multiple: true
          path: bottle-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          python3 - <<'PY'
          import json
          import pathlib
          import shutil
          import sys

          artifacts = pathlib.Path("bottle-artifacts")
          release_assets = pathlib.Path("release-assets")
          json_files = sorted(artifacts.glob("*.json"))
          if not json_files:
              print("No bottle JSON files downloaded", file=sys.stderr)
              sys.exit(1)

          for json_path in json_files:
              with json_path.open() as fh:
                  data = json.load(fh)
              for entry in data.values():
                  tags = entry["bottle"]["tags"]
                  for tag in tags.values():
                      local_name = tag["local_filename"]
                      remote_name = tag["filename"]
                      src = artifacts / local_name
                      dst = release_assets / remote_name
                      if not src.exists():
                          print(f"Missing bottle archive referenced by {json_path.name}: {src.name}", file=sys.stderr)
                          sys.exit(1)
                      shutil.copy2(src, dst)
          PY

      - name: Merge bottle JSON into formula
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          json_files=(bottle-artifacts/*.json)
          if (( ${#json_files[@]} == 0 )); then
            echo "No bottle JSON files downloaded"
            exit 1
          fi
          brew bottle --merge --write --no-commit "${json_files[@]}"
          brew style Formula/globalplatform.rb

      - name: Commit and push bottle block
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/globalplatform.rb; then
            echo "No bottle changes were produced"
            exit 1
          fi
          git add Formula/globalplatform.rb
          git commit -m "Update bottle hashes for ${PACKAGE_VERSION}"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Create tag
        shell: bash
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          effective_release_tag="${RELEASE_TAG:-$PACKAGE_VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${effective_release_tag}" >/dev/null 2>&1; then
            echo "Tag ${effective_release_tag} already exists on origin"
            exit 1
          fi
          git tag "${effective_release_tag}"
          git push origin "refs/tags/${effective_release_tag}"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          effective_release_tag="${RELEASE_TAG:-$PACKAGE_VERSION}"
          if gh release view "$effective_release_tag" >/dev/null 2>&1; then
            echo "Release $effective_release_tag already exists"
            exit 1
          fi

          release_args=()
          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "$effective_release_tag" release-assets/* \
            --title "$effective_release_tag" \
            --notes "Bottle release for $PACKAGE_VERSION" \
            "${release_args[@]}"
